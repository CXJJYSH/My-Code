<!-- 首先是SuperSimpleDev的4f练习。 -->

<button class="subscribe-button">
    SUBSCRIBE
</button>

<button class="join-button">
    JOIN
</button>

<button class="tweet-button">
    Tweet
</button>

<style>
    .subscribe-button {
        background-color: rgb(200, 0, 0);
        color: white;
        border: none;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        margin-left: 20px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 16px;
        padding-right: 16px;
        transition: opacity 0.15s;
        vertical-align: top;
    }

    .subscribe-button:hover {
        opacity: 0.8;
    }

    .subscribe-button:active {
        opacity: 0.5;
    }



    .join-button {
        background-color: white;
        /* border-color: rgb(41, 118, 211); */
        border-color: rgb(6, 95, 212);
        border-style: solid;
        border-width: 1px;
        /* 这里边界上下各加了一像素所以下面padding上下就要各减少一像素以与其它没边界的按钮齐平。*/
        color: rgb(6, 95, 212);
        padding-left: 30px;
        padding-top: 20px;
        border-radius: 2px;
        cursor: pointer;
        transition: background-color 0.15s, color 0.15s;
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 16px;
        padding-right: 16px;
    }

    .join-button:hover {
        background-color: rgb(6, 95, 212);
        color: white;
    }

    .join-button:active {
        opacity: 0.7;
    }



    .tweet-button {
        /* background-color: rgb(0, 157, 255); */
        background-color: rgb(29, 155, 240);
        border: none;
        color: white;

        padding-top: 9.5px;
        padding-bottom: 9.5px;
        /* Super这里上下都写了10px，但是我感觉都写成9.5px高度和其它两个按钮才更匹配。 */
        padding-left: 16px;
        padding-right: 16px;

        border-radius: 18px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        margin-left: 8px;
        transition: 0.15s;
        vertical-align: top;
    }

    .tweet-button:hover {
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.15);
    }

    .tweet-button:active {
        opacity: 0.7;
    }
</style>
