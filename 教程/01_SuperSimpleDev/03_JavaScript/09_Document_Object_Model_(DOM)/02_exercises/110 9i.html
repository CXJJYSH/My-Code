<!DOCTYPE html>

<html>

<head>
    <title>
        Cart Quantity
    </title>
</head>

<body>
    <button onclick="
        document.querySelector('.js-message').innerHTML = `Cart quantity: ${cartQuantity}`;
    ">
        Show Quantity
    </button>

    <button onclick="
        updateCartQuantity(1);
    ">
        Add to Cart
    </button>

    <button onclick="
        updateCartQuantity(2);
    ">
        +2
    </button>

    <button onclick="
        updateCartQuantity(3);
    ">
        +3
    </button>

    <button onclick="
        updateCartQuantity(4);
    ">
        +4
    </button>

    <button onclick="
        updateCartQuantity(5);
    ">
        +5
    </button>

    <button onclick="
        updateCartQuantity(-1);
    ">
        Remove from cart
    </button>

    <button onclick="
        updateCartQuantity(-2);
    ">
        -2
    </button>

    <button onclick="
        updateCartQuantity(-3);
    ">
        -3
    </button>

    <button onclick="
        cartQuantity = 0;
        console.log('Cart was reset.');
        
        displayCartQuantity();
    ">
        Reset Cart
    </button>

    <p class="js-message">

    </p>

    <script>
        let cartQuantity = 0;

        cartQuantity = Number(localStorage.getItem('cartQuantity', JSON.parse(cartQuantity)));
        // 写9j的时候发现这里也可以用 || 来一行设置cartQuantity的值（包含初始值）。

        displayCartQuantity();

        function updateCartQuantity(change) {
            if (cartQuantity + change > 10) {
                alert('The cart is full');
                return
            }

            if (cartQuantity + change < 0) {
                alert('Not enough items in the cart');
                return;
            }

            cartQuantity += change;

            displayCartQuantity();

            localStorage.setItem('cartQuantity', JSON.stringify(cartQuantity));
        }

        function displayCartQuantity() {
            document.querySelector('.js-message').innerHTML = `Cart quantity: ${cartQuantity}`;
        }
    </script>
</body>

</html>
