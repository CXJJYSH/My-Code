<!DOCTYPE html>

<body>
    <script>
        const array1 = ['hello', 'world', 'search', 'good'];
        const array2 = ['not', 'found'];

        let index = -1;

        for (let i = 0; i < array1.length; i++) {
            if (array1[i] === 'search') {
                index = i;
            }
        }

        console.log(index);

        index = -1;

        for (let i = 0; i < array2.length; i++) {
            if (array2[i] === 'search') {
                index = i;
            }
        }

        console.log(index);
    </script>
</body>

</html>
