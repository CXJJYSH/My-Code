<!DOCTYPE html>

<html>

<head>
    <title>
        11i
    </title>
</head>

<body>
    <script>
        function addNum(array, num) {
            for (let i = 0; i < array.length; i++) {
                array[i] += num;
            }

            return array;
        }

        console.log(addNum([1, 2, 3], 3));
    </script>
</body>

</html>
