        // Arrays are references

        // Shortcut: Destructuring

        // More details about loops 
        // 1. break = exit a loop early
        for (let i = 1; i <= 10; i++) {
            console.log(i);
            if (i === 8) {
                break;
            }
        }
        // 2. continue = skip 1 iteration 
        for (let i = 1; i <= 10; i++) {
            if (i % 3 === 0) {
                continue;
            }
            console.log(i);
            if (i === 8) {
                break;
            }
        }

        let i = 1;

        while (i <= 10) {
            if (i % 3 === 0) {
                i++;
                continue;
            }
            console.log(i);
            i++;
        }

        // How to use loops with functions 
        function doubleArray(nums) {
            const numsDoubled = [];

            for (let i = 0; i < nums.length; i++) {
                const num = nums[i];
                if (num === 0) {
                    return numsDoubled;
                }
                numsDoubled.push(num * 2);
            }

            return numsDoubled;
        }
        console.log(doubleArray([1, 1, 3]));
