<!DOCTYPE html>

<html>

<head>
    <title>
        9h
    </title>

    <link rel="stylesheet" href="9h.css">
</head>

<body>
    <div>
        <img class="google" src="google-logo.png">
    </div>

    <div>
        <input class="search" placeholder="Search Google or type a URL">
    </div>

    <div>
        <button class="google-search">
            Google Search
        </button>

        <button class="lucky">
            I'm Feeling Lucky
        </button>
    </div>
</body>

</html>

<!-- 每一个元素都放到一个div里。

而且button的名字还可以一次性给两个，一个可以和其它button的名字相同，另一个可以是单独的一个名字。

比如
<button class="google-button search-button">Google Search</button>
<button class="google-button">I'm Feeling Lucky</button>

style的时候就可以用google-button同时style两个，用search-button单独style一个。 -->
