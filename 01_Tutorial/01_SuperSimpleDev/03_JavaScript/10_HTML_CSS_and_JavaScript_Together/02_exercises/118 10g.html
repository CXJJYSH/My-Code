<!DOCTYPE html>

<html>

<head>
    <title>
        10g
    </title>

    <style>
        .toggle-button {
            background-color: rgb(230, 230, 230);
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            margin-right: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .is-toggled {
            background-color: black;
            color: white;
        }
    </style>
</head>

<body>
    <button class="toggle-button gaming-button" onclick="
        toggleButton('.gaming-button');
    ">
        Gaming
    </button>

    <button class="toggle-button music-button" onclick="
        toggleButton('.music-button');        
    ">
        Music
    </button>

    <button class="toggle-button tech-button" onclick="
        toggleButton('.tech-button');    
    ">
        Tech
    </button>

    <script>
        function toggleButton(selector) {
            const button = document.querySelector(selector);
            if (!button.classList.contains("is-toggled")) {
                turnOffPreviousButton();
                button.classList.add("is-toggled");
            } else {
                button.classList.remove("is-toggled");
            }
        }

        function turnOffPreviousButton() {
            const previousButton = document.querySelector('.is-toggled');
            if (previousButton) {
                previousButton.classList.remove('is-toggled');
            }
        }
    </script>
</body>

</html>
