<body>
    <script>
        function convertToFahrenheit(celsius) {
            fahrenheit = (celsius * 9 / 5) + 32;
            return fahrenheit;
        }

        convertToFahrenheit(25);

        console.log(fahrenheit);

        function convertToCelsius(fahrenheit) {
            celsius = (fahrenheit - 32) * 5 / 9;
            return celsius;
        }

        convertToCelsius(86);

        console.log(celsius);
    </script>
</body>
