<!DOCTYPE html>

<html>

<head>

</head>

<body>
    <script>
        function convertLength(length, from, to) {
            if (from === to) {
                return `${length}${to}`; // 这里把from改成to更符合逻辑一点。
            } else if (from === 'miles' && to === 'km') { // 后面加&&只是为了防止to不符合输入规范出现问题的时候而写的。
                return `${length * 1.6}km`;
            } else if (from === 'km' && to === 'miles') { // 后面加&&只是为了防止to不符合输入规范出现问题的时候而写的。
                return `${length / 1.6}miles`;
            }
        }

        console.log(convertLength(50, 'miles', 'km'));
        console.log(convertLength(32, 'km', 'miles'));
        console.log(convertLength(50, 'km', 'km'));
        console.log(convertLength(50, 'miles', 'miles'));
    </script>
</body>

</html>
