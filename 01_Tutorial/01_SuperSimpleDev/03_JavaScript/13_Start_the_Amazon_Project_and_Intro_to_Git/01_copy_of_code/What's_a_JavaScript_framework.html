<!DOCTYPE html>

<html>

<head>

</head>

<body>
    <script>
        let todos = [
            'Get groceries',
            'Make dinner',
            'Wash car'
        ];

        todos.forEach(todo => {
            let div = document.createElement('div');
            div.innerText = todo;
            document.body.appendChild(div);
        })
    </script>
</body>

</html>
