<!DOCTYPE html>

</head>

<body>
    <button onclick="
            displayMessage();
        ">
        Add to cart
    </button>

    <p class="display-message"></p>

    <script>
        function displayMessage() {
            const p = document.querySelector('.display-message');

            p.innerHTML = 'Added';

            setTimeout(function () {
                p.innerHTML = '';
            }, 2000);
        }
    </script>
</body>

</html>
