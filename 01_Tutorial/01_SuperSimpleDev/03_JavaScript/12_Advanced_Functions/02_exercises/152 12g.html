<!-- 下面是Simon的代码，我觉得他的这段代码明显好得多。 -->

<!DOCTYPE html>

<html>

<head>
    <title>
        App
    </title>
</head>

<body>
    <script>
        setInterval(function () {
            if (document.title === 'App') {
                document.title = '(2) new messages';
            } else {
                document.title = 'App';
            }
        }, 1000);
    </script>
</body>

</html>
