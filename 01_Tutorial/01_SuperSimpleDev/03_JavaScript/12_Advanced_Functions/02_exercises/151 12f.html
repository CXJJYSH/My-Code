<!DOCTYPE html>

<html>

<head>
    <title>
        12f
    </title>
</head>

<body>
    <button onclick="
        clearTimeout(timeoutId);
        displayMessage();
    ">
        Add to cart
    </button>

    <p class="display-message"></p>

    <script>
        let timeoutId;
        function displayMessage() {
            const p = document.querySelector('.display-message');

            p.innerHTML = 'Added';

            timeoutId = setTimeout(function () {
                p.innerHTML = '';
            }, 2000);
        }
    </script>
</body>

</html>

<!-- 下面是Simon的代码，封装性更好。 -->

<!DOCTYPE html>

<html>

<head></head>

<body>
    <button class="js-button" onclick="
      displayMessage();
    ">Add to cart</button>

    <p class="js-message"></p>

    <script>
        let timeoutId2;

        function displayMessage() {
            const messageElement = document.querySelector('.js-message');
            messageElement.innerHTML = 'Added';

            // First, cancel the previous timeout so that
            // it doesn't remove the message too quickly.
            clearTimeout(timeoutId2);

            timeoutId2 = setTimeout(function () {
                messageElement.innerHTML = '';
            }, 2000);
        }
    </script>
</body>

</html>
