        */

        // setTimeout() is a build-in function.
        // The first parameter is a function we want to run in the future. 
        // The second parameter is how long to wait before running this function.(A number in milliseconds/ms) 
        setTimeout(function () {
            console.log('timeout');
        },);
    </script>
