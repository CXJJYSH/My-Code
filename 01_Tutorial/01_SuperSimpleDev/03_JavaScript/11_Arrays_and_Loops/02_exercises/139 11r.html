<!DOCTYPE html>

<html>

<head>
    <title>
        11q
    </title>
</head>

<body>
    <script>
        function removeEgg(foods) {
            const result = [];

            for (let i = 0; i < foods.length; i++) {
                if (foods[i] === 'egg') {
                    continue;
                } else {
                    result.push(foods[i]);
                }
                // 这里也可以不写else直接接着return的。 
            }

            return result;
        }

        console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
    </script>
</body>

</html>
